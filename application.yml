server:
  port: ${PORT:10000}
  address: 0.0.0.0

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.11.5"
      snapshot: false # 🛠️ FIXED FOR LAVALINK V4 COMPATIBILITY RULES
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.3.0"
      snapshot: false
  
  server:
    password: "${LAVALINK_SERVER_PASSWORD}" # 🔑 FIXED: moved out of the web server block into the engine block
    sources:
      youtube: false # legacy built-in driver is officially disabled
      soundcloud: true
      bandcamp: true
      twitch: true
      vimeo: true
      http: true
      local: false

# 🚀 PLUGINS MUST EXIST AT ROOT LEVEL - ADJUSTED LOGIC TRACKING
plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - TV         # 🚀 REQUIRED FOR OAUTH FLOW AND AUDIO STREAMING
      - MUSIC      # kept secondary to catch ytmsearch metadata tracking
      - TVHTML5_SIMPLY
    oauth:
      enabled: true  # forces the link generation handshake on boot
      # refreshToken: "" -> leave this completely commented out on your first initialization boot

  lavasrc:
    providers:
      - "ytsearch:\"%artist% - %title%\""
      - "scsearch:\"%artist% - %title%\""
    sources:
      spotify: true
      apple: true
      soundcloud: true
      youtube: true

# 📝 standard logger routing to keep track of container state
logging:
  level:
    root: info
    lavalink: info
