server:
  port: ${PORT:10000}
  address: 0.0.0.0

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      snapshot: false
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.3"
      snapshot: false
  
  server:
    password: "${LAVALINK_SERVER_PASSWORD}" # "i need the password"
    sources: 
      youtube: false # whatever makes it work i guess - blasie
      soundcloud: true
      bandcamp: true
      twitch: true
      vimeo: true
      http: true
      local: false
    koe:
      gateway: v4 
      transport: tcp # "fuck udp routing let's use tcp" - blasie

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - TV         
      - MUSIC      
      - TVHTML5_SIMPLY
    oauth:
      enabled: true  # "whatever lets the node work" - blasie
      refreshToken: "${YOUTUBE_ACCESS_TOKEN}"

    remoteCipher:
      url: "https://cipher.kikkia.dev/"
      userAgent: "blasieuwu-misoyan"

  lavasrc:
    providers:
      - "ytsearch:\"%artist% - %title%\""
      - "scsearch:\"%artist% - %title%\""
    sources:
      spotify: true
      apple: true
      soundcloud: true
      youtube: true

logging:
  level:
    root: info
    lavalink: info
